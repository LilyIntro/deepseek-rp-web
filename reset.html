<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lily RP Reset</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f6f7fb; color: #111827; }
    main { width: min(680px, calc(100vw - 32px)); background: #fff; border: 1px solid #e5e7eb; border-radius: 18px; padding: 24px; box-shadow: 0 14px 34px rgba(15,23,42,.08); }
    a, button { color: #2563eb; }
    button { font: inherit; border: 1px solid #d1d5db; background: #fff; border-radius: 12px; padding: 9px 13px; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <h1>缓存清理</h1>
    <p id="status">正在清理旧 Service Worker 和 Cache……</p>
    <p>这个页面不会删除你的角色卡、设置和聊天存档。</p>
    <button id="go">打开 Lily RP v5</button>
  </main>
  <script>
    async function reset() {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) await reg.unregister();
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          for (const key of keys) await caches.delete(key);
        }
        document.getElementById('status').textContent = '清理完成。';
      } catch (e) {
        document.getElementById('status').textContent = '清理时遇到问题：' + e.message;
      }
    }
    document.getElementById('go').addEventListener('click', () => { location.href = './?v=rp-v5'; });
    reset();
  </script>
</body>
</html>
