<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Lily RP Cache</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f6f7fb; color: #111827; }
    main { width: min(560px, calc(100vw - 32px)); background: #fff; border: 1px solid #e5e7eb; border-radius: 18px; padding: 24px; box-shadow: 0 14px 34px rgba(15,23,42,.08); }
    button, a { display: inline-block; margin-top: 12px; border: 1px solid #2563eb; background: #2563eb; color: white; border-radius: 12px; padding: 10px 14px; text-decoration: none; cursor: pointer; }
    p { color: #667085; line-height: 1.7; }
  </style>
</head>
<body>
  <main>
    <h1>缓存清理页</h1>
    <p id="status">正在清理旧 Service Worker 和缓存……</p>
    <a href="./?v=rp-v4">返回 Lily RP v4</a>
  </main>
  <script>
    (async () => {
      const status = document.getElementById('status');
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) await reg.unregister();
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          for (const key of keys) await caches.delete(key);
        }
        status.textContent = '清理完成。请点击下面按钮返回新版。';
      } catch (error) {
        status.textContent = '清理时遇到问题：' + error.message + '。仍可尝试返回新版。';
      }
    })();
  </script>
</body>
</html>
