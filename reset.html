<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lily RP Reset</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;max-width:720px;margin:10vh auto;padding:24px;line-height:1.8}button{padding:10px 14px;border-radius:12px;border:1px solid #ccc;background:#fff}</style></head><body><h1>Lily RP v6.3 缓存清理</h1><p id="msg">正在清理旧 Service Worker 和缓存……</p><button id="go">返回 Lily RP</button><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}document.getElementById('msg').textContent='清理完成。现在可以返回新版页面。';}catch(e){document.getElementById('msg').textContent='清理时遇到问题：'+e.message;}document.getElementById('go').onclick=()=>location.href='./?v=rp-v6-1';})();</script></body></html>
