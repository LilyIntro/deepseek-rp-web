<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="color-scheme" content="dark light" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DeepSeek" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./style.css" />

  <title>My DeepSeek</title>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">D</div>
        <div>
          <h1>My DeepSeek</h1>
          <p id="statusText">未连接</p>
        </div>
      </div>
      <div class="top-actions">
        <button id="clearBtn" class="ghost" type="button" title="清空对话">清空</button>
        <button id="settingsBtn" class="ghost" type="button" title="设置">设置</button>
      </div>
    </header>

    <main id="chat" class="chat" aria-live="polite"></main>

    <form id="composer" class="composer">
      <textarea id="userInput" rows="1" placeholder="输入你的问题…" autocomplete="off"></textarea>
      <button id="sendBtn" class="send" type="submit">发送</button>
    </form>
  </div>

  <dialog id="settingsDialog" class="dialog">
    <form method="dialog" class="settings-panel">
      <h2>设置</h2>
      <p class="hint">API Key 不放在 GitHub。这里填写你的 Worker 地址和 APP_TOKEN。</p>

      <label>
        Worker 接口地址
        <input id="workerUrl" inputmode="url" placeholder="https://deepseek-proxy.marea-deepseek-web.workers.dev/chat" />
      </label>

      <label>
        APP_TOKEN
        <input id="appToken" type="password" placeholder="你在 Cloudflare Worker Secret 里设置的密码" />
      </label>

      <label>
        模型
        <select id="modelSelect">
          <option value="deepseek-v4-flash">deepseek-v4-flash：日常推荐</option>
          <option value="deepseek-v4-pro">deepseek-v4-pro：复杂任务</option>
        </select>
      </label>

      <label>
        系统提示词
        <textarea id="systemPrompt" rows="3" placeholder="例如：你是一个简洁、准确、友好的中文助手。"></textarea>
      </label>

      <label class="inline">
        <input id="thinkingMode" type="checkbox" />
        启用 thinking mode
      </label>

      <menu>
        <button value="cancel" type="button" id="cancelSettings" class="secondary">取消</button>
        <button value="default" type="submit" id="saveSettings">保存</button>
      </menu>
    </form>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
