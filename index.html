<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Lily RP v6 Workbench</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Lily RP" />
  <style>
    :root {
      --bg: #f6f7fb; --card: #ffffff; --card2: #fbfcff; --text: #111827; --muted: #667085;
      --line: #e5e7eb; --line2: #d1d5db; --primary: #2563eb; --primary2: #1d4ed8;
      --soft: #eff6ff; --danger: #dc2626; --dangerSoft: #fef2f2; --green: #16a34a; --warn: #b45309;
      --shadow: 0 14px 34px rgba(15,23,42,.08); --input: #fff; --button: #fff; --toast: #111827;
      --userBubble: #2563eb; --assistantBubble: #fff; --radius: 18px;
    }
    html[data-theme="dark"] {
      --bg: #0b1020; --card: #111827; --card2: #0f172a; --text: #e5e7eb; --muted: #9ca3af;
      --line: #243044; --line2: #374151; --primary: #60a5fa; --primary2: #93c5fd;
      --soft: #172554; --danger: #f87171; --dangerSoft: #450a0a; --green: #4ade80; --warn: #fbbf24;
      --shadow: 0 14px 34px rgba(0,0,0,.26); --input: #0b1020; --button: #111827; --toast: #020617;
      --userBubble: #1d4ed8; --assistantBubble: #111827;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; line-height: 1.6; }
    button, input, textarea, select { font: inherit; }
    button { border: 1px solid var(--line2); background: var(--button); color: var(--text); border-radius: 12px; padding: 9px 13px; cursor: pointer; }
    button:hover { border-color: var(--muted); background: var(--card2); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .primary { border-color: var(--primary); background: var(--primary); color: #fff; }
    .primary:hover { border-color: var(--primary2); background: var(--primary2); }
    .danger { border-color: color-mix(in srgb, var(--danger) 38%, var(--line)); background: var(--dangerSoft); color: var(--danger); }
    .ghost { background: transparent; }
    .mini { padding: 5px 8px; border-radius: 9px; font-size: 12px; color: var(--muted); }
    .app { min-height: 100dvh; display: grid; grid-template-rows: auto 1fr auto; }
    .header { position: sticky; top: 0; z-index: 20; background: color-mix(in srgb, var(--card) 92%, transparent); backdrop-filter: blur(18px); border-bottom: 1px solid var(--line); }
    .header-inner { max-width: 1280px; margin: 0 auto; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .logo { width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center; background: linear-gradient(135deg,#2563eb,#8b5cf6); color: white; font-weight: 800; }
    .brand h1 { margin: 0; font-size: 18px; line-height: 1.25; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .toolbar { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .main { max-width: 1280px; width: 100%; margin: 0 auto; padding: 18px; display: grid; grid-template-columns: 330px minmax(0,1fr); gap: 18px; }
    .side { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
    .card h2, .card h3 { margin: 0 0 8px; line-height: 1.3; }
    .card h2 { font-size: 20px; } .card h3 { font-size: 15px; }
    .card p { margin: 7px 0; color: var(--muted); font-size: 14px; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .pill { border-radius: 999px; background: var(--card2); border: 1px solid var(--line); color: var(--muted); padding: 5px 9px; font-size: 12px; }
    .session-list, .small-list { display: grid; gap: 8px; margin-top: 12px; max-height: 260px; overflow: auto; }
    .list-item, .session-item { width: 100%; text-align: left; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 10px 11px; border-radius: 13px; }
    .session-item.active, .list-item.active { border-color: var(--primary); background: var(--soft); }
    .item-title { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-meta { color: var(--muted); font-size: 12px; }
    .chat-card { min-height: calc(100dvh - 188px); display: grid; grid-template-rows: auto 1fr; overflow: hidden; padding: 0; }
    .chat-head { padding: 16px 18px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .chat-head h2 { margin: 0; font-size: 18px; }
    .chat-head p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
    .status { font-size: 13px; color: var(--muted); text-align: right; }
    .status.ok { color: var(--green); } .status.err { color: var(--danger); }
    .chat { min-height: 360px; max-height: calc(100dvh - 282px); overflow-y: auto; padding: 18px; background: var(--card2); }
    .empty { border: 1px dashed var(--line2); border-radius: 16px; padding: 22px; color: var(--muted); background: var(--card); }
    .message { margin: 0 0 15px; display: flex; }
    .message.user { justify-content: flex-end; } .message.assistant { justify-content: flex-start; } .message.system { justify-content: center; }
    .bubble { max-width: min(820px,92%); border: 1px solid var(--line); border-radius: 18px; padding: 13px 15px; background: var(--assistantBubble); box-shadow: 0 8px 22px rgba(15,23,42,.05); overflow-wrap: anywhere; }
    .user .bubble { background: var(--userBubble); border-color: var(--userBubble); color: white; border-bottom-right-radius: 6px; }
    .assistant .bubble { border-bottom-left-radius: 6px; }
    .system .bubble { background: var(--card); color: var(--muted); max-width: 88%; text-align: center; font-size: 14px; box-shadow: none; }
    .content { white-space: pre-wrap; }
    .msg-actions { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
    details.reasoning { margin-top: 11px; border: 1px solid color-mix(in srgb, var(--primary) 28%, var(--line)); background: var(--soft); border-radius: 12px; padding: 9px 11px; }
    details.reasoning summary { cursor: pointer; color: var(--primary); font-weight: 700; font-size: 13px; }
    .reasoning-body { margin-top: 8px; color: var(--text); font-size: 13px; white-space: pre-wrap; max-height: 260px; overflow: auto; }
    .composer-wrap { position: sticky; bottom: 0; background: color-mix(in srgb, var(--bg) 94%, transparent); backdrop-filter: blur(18px); border-top: 1px solid var(--line); padding: 12px 18px max(12px, env(safe-area-inset-bottom)); }
    .composer { max-width: 1280px; margin: 0 auto; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
    .input-shell { background: var(--input); border: 1px solid var(--line2); border-radius: 16px; padding: 10px 12px; box-shadow: 0 8px 24px rgba(15,23,42,.06); }
    textarea { width: 100%; border: 0; outline: none; resize: none; min-height: 52px; max-height: 180px; color: var(--text); background: transparent; }
    .send-row { display: flex; gap: 8px; }
    dialog { width: min(980px, calc(100vw - 24px)); max-height: calc(100dvh - 24px); overflow: auto; border: 0; border-radius: 20px; padding: 0; box-shadow: 0 24px 80px rgba(15,23,42,.24); background: var(--card); color: var(--text); }
    dialog::backdrop { background: rgba(15,23,42,.32); backdrop-filter: blur(3px); }
    .dialog-card { padding: 18px; background: var(--card); }
    .dialog-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 12px; margin-bottom: 14px; }
    .dialog-head h2 { margin: 0; font-size: 18px; }
    label { display: block; margin: 12px 0; color: var(--text); font-weight: 700; font-size: 14px; }
    input, select, .dialog-card textarea { width: 100%; margin-top: 6px; border: 1px solid var(--line2); border-radius: 12px; padding: 10px 11px; background: var(--input); color: var(--text); outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px color-mix(in srgb,var(--primary) 18%,transparent); }
    input[type="range"] { padding: 0; accent-color: var(--primary); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .manage-grid { display: grid; grid-template-columns: 280px minmax(0,1fr); gap: 14px; }
    .checkline { display: flex; align-items: flex-start; gap: 9px; font-weight: 500; color: var(--text); }
    .checkline input { width: auto; margin: 4px 0 0; }
    .dialog-actions { display: flex; justify-content: flex-end; flex-wrap: wrap; gap: 9px; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--line); }
    .section-title { margin: 16px 0 6px; padding-top: 12px; border-top: 1px solid var(--line); font-weight: 800; }
    .range-row { display: grid; grid-template-columns: 120px 1fr 42px; align-items: center; gap: 10px; margin: 8px 0; }
    .range-row span { color: var(--muted); font-size: 13px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 14px; }
    .tab-btn.active { border-color: var(--primary); background: var(--soft); color: var(--primary); }
    .hint { color: var(--muted); font-size: 13px; margin: 6px 0; }
    .toast { position: fixed; left: 50%; bottom: 94px; transform: translateX(-50%); max-width: min(760px, calc(100vw - 28px)); z-index: 100; background: var(--toast); color: #fff; border-radius: 999px; padding: 10px 15px; box-shadow: 0 16px 44px rgba(15,23,42,.28); display: none; white-space: pre-wrap; }
    .toast.show { display: block; } .toast.err { background: #991b1b; }
    .hidden { display: none !important; }
    @media (max-width: 980px) { .header-inner { align-items: flex-start; flex-direction: column; } .toolbar { justify-content: flex-start; } .main { grid-template-columns: 1fr; padding: 12px; } .chat { max-height: none; min-height: 54dvh; } .chat-card { min-height: auto; } .composer { grid-template-columns: 1fr; } .send-row { justify-content: flex-end; } .manage-grid { grid-template-columns: 1fr; } .grid2,.grid3 { grid-template-columns: 1fr; } }
    @media (max-width: 560px) { .toolbar button,.send-row button { flex: 1; } .toolbar,.send-row { width: 100%; } .bubble { max-width: 100%; } .brand p { white-space: normal; } .chat-head { flex-direction: column; align-items: flex-start; } .status { text-align: left; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="brand"><div class="logo">L</div><div><h1>Lily RP v6</h1><p id="subtitle">角色库 · 世界书 · 记忆系统 · 回复调参 · 多窗口</p></div></div>
        <div class="toolbar">
          <button id="themeToggleBtn" type="button">黑夜</button>
          <button id="newWindowBtn" type="button">新窗口</button>
          <button id="popWindowBtn" type="button">弹出当前</button>
          <button id="charactersBtn" type="button">角色库</button>
          <button id="loreBtn" type="button">世界书</button>
          <button id="memoryBtn" type="button">记忆</button>
          <button id="controlsBtn" type="button">调参</button>
          <button id="settingsBtn" type="button">设置</button>
          <button id="regenLastBtn" type="button">重新生成</button>
          <button id="exportBtn" type="button">导出</button>
          <button id="importBtn" type="button">导入</button>
          <button id="clearBtn" type="button" class="danger">清空</button>
        </div>
      </div>
    </header>

    <main class="main">
      <aside class="side">
        <section class="card">
          <h2 id="sessionTitleSide">未命名窗口</h2>
          <p id="sessionDesc">当前窗口的角色、世界书、记忆与调参会一起参与生成。</p>
          <div class="pill-row">
            <span class="pill" id="modelPill">deepseek-v4-flash</span>
            <span class="pill" id="thinkingPill">思考：关</span>
            <span class="pill" id="themePill">白天</span>
          </div>
        </section>
        <section class="card">
          <h3>对话窗口</h3>
          <div class="pill-row"><button id="newSessionBtn" type="button">新建</button><button id="copySessionBtn" type="button">复制当前</button><button id="renameSessionBtn" type="button">重命名</button><button id="deleteSessionBtn" type="button" class="danger">删除</button></div>
          <div id="sessionList" class="session-list"></div>
        </section>
        <section class="card">
          <h3>当前登场角色</h3>
          <p id="activeCharHint">未启用角色。点「角色库」添加并勾选当前窗口启用。</p>
          <div id="activeCharList" class="small-list"></div>
        </section>
        <section class="card">
          <h3>本轮世界书</h3>
          <p id="loreHint">发送前会按关键词、常驻项与当前角色自动筛选。</p>
          <div id="triggeredLoreList" class="small-list"></div>
        </section>
        <section class="card">
          <h3>记忆摘要</h3>
          <p id="memoryPreview">未写入长期记忆。</p>
        </section>
      </aside>

      <section class="card chat-card">
        <div class="chat-head"><div><h2 id="chatTitle">当前对话</h2><p id="chatMeta">本地存档 · 只保存在当前浏览器</p></div><div id="status" class="status">未测试连接</div></div>
        <div id="chat" class="chat"></div>
      </section>
    </main>

    <footer class="composer-wrap">
      <form id="composer" class="composer">
        <div class="input-shell"><textarea id="userInput" placeholder="输入你的动作、台词或剧情……"></textarea></div>
        <div class="send-row"><button id="continueBtn" type="button">续写</button><button id="sendBtn" type="submit" class="primary">发送</button></div>
      </form>
    </footer>
  </div>

  <dialog id="settingsDialog"><div class="dialog-card"><div class="dialog-head"><h2>设置</h2><button id="closeSettings" type="button">×</button></div>
    <label>Worker 接口地址<input id="workerUrl" placeholder="https://xxx.workers.dev/chat" /></label>
    <label>APP_TOKEN<input id="appToken" type="password" placeholder="输入你在 Cloudflare 设置的 APP_TOKEN" /></label>
    <div class="grid2"><label>模型<select id="modelSelect"><option value="deepseek-v4-flash">deepseek-v4-flash</option><option value="deepseek-v4-pro">deepseek-v4-pro</option></select></label><label>主题<select id="themeSelect"><option value="light">白天模式</option><option value="dark">黑夜模式</option><option value="auto">跟随系统</option></select></label></div>
    <div class="grid2"><label>Temperature<input id="temperatureInput" type="number" min="0" max="2" step="0.1" /></label><label>Max Tokens<input id="maxTokensInput" type="number" min="256" max="4000" step="100" /></label></div>
    <label class="checkline"><input id="thinkingInput" type="checkbox" /><span>开启思考模式，并在回复下方显示可折叠「思考过程」。</span></label>
    <label class="checkline"><input id="fixedCoreInput" type="checkbox" /><span>使用内置固定核心规则。</span></label>
    <div class="dialog-actions"><button id="testBtn" type="button">测试连接</button><button id="cancelSettings" type="button">取消</button><button id="saveSettings" type="button" class="primary">保存</button></div>
  </div></dialog>

  <dialog id="charactersDialog"><div class="dialog-card"><div class="dialog-head"><h2>角色库 / 多角色登场</h2><button id="closeCharacters" type="button">×</button></div>
    <div class="manage-grid">
      <div><div class="pill-row"><button id="newCharBtn" type="button">新建角色</button><button id="duplicateCharBtn" type="button">复制角色</button></div><div id="characterList" class="small-list"></div></div>
      <div>
        <div class="grid2"><label>角色名<input id="charName" /></label><label>定位<input id="charRole" placeholder="主角 / NPC / 反派 / 临时角色" /></label></div>
        <label class="checkline"><input id="charActive" type="checkbox" /><span>在当前窗口启用此角色</span></label>
        <label class="checkline"><input id="charPrimary" type="checkbox" /><span>设为当前窗口主控角色</span></label>
        <label>别名 / 触发词<input id="charAlias" placeholder="用逗号分隔，例如 Lyn,林恩" /></label>
        <label>公开设定<textarea id="charPublic" rows="4" placeholder="其他角色或玩家可见的身份、外貌、表层性格。"></textarea></label>
        <label>隐藏设定<textarea id="charPrivate" rows="4" placeholder="真实动机、秘密、不能被旁白提前揭示的内容。"></textarea></label>
        <label>说话风格<textarea id="charSpeech" rows="3" placeholder="语气、用词、停顿、禁用表达。"></textarea></label>
        <label>行为规则<textarea id="charBehavior" rows="3" placeholder="弱点、底线、关系模式、决策倾向。"></textarea></label>
        <div class="section-title">对玩家关系值</div>
        <div id="relationSliders"></div>
        <label>关系备注<textarea id="charRelationNote" rows="3" placeholder="用自然语言补充当前关系。"></textarea></label>
        <div class="dialog-actions"><button id="deleteCharBtn" type="button" class="danger">删除角色</button><button id="saveCharBtn" type="button" class="primary">保存角色</button></div>
      </div>
    </div>
  </div></dialog>

  <dialog id="loreDialog"><div class="dialog-card"><div class="dialog-head"><h2>世界书 / Lorebook</h2><button id="closeLore" type="button">×</button></div>
    <div class="manage-grid">
      <div><div class="pill-row"><button id="newLoreBtn" type="button">新建条目</button><button id="testLoreBtn" type="button">预览触发</button></div><div id="loreList" class="small-list"></div></div>
      <div>
        <div class="grid2"><label>标题<input id="loreTitle" /></label><label>类型<input id="loreType" placeholder="组织 / 地点 / 道具 / 历史 / 秘密" /></label></div>
        <label>关键词<input id="loreKeywords" placeholder="用逗号分隔，例如 圣堂,议会,白骨法杖" /></label>
        <div class="grid3"><label>优先级<input id="lorePriority" type="number" min="0" max="100" step="1" /></label><label>范围<select id="loreScope"><option value="global">全局</option><option value="session">仅当前窗口</option></select></label><label>可见性<select id="loreVisibility"><option value="internal">内部设定，不得直接揭示</option><option value="known">可正常叙述</option><option value="conditional">需剧情触发后揭示</option></select></label></div>
        <label class="checkline"><input id="loreEnabled" type="checkbox" /><span>启用条目</span></label>
        <label class="checkline"><input id="loreAlwaysOn" type="checkbox" /><span>常驻发送</span></label>
        <label>正文<textarea id="loreContent" rows="7" placeholder="写世界观、组织、地点、事件、秘密等。"></textarea></label>
        <label>备注 / 信息权限<textarea id="loreNotes" rows="3" placeholder="例如：只能影响知情角色行为，不得提前剧透给玩家。"></textarea></label>
        <div class="dialog-actions"><button id="deleteLoreBtn" type="button" class="danger">删除条目</button><button id="saveLoreBtn" type="button" class="primary">保存条目</button></div>
      </div>
    </div>
  </div></dialog>

  <dialog id="memoryDialog"><div class="dialog-card"><div class="dialog-head"><h2>记忆系统</h2><button id="closeMemory" type="button">×</button></div>
    <div class="grid2"><label>短期记忆消息数<input id="shortLimitInput" type="number" min="4" max="120" step="2" /></label><label>自动总结使用模型<input id="summaryModelInput" placeholder="默认使用当前模型" /></label></div>
    <label>当前窗口场景设定<textarea id="scenarioPromptInput" rows="4" placeholder="世界观、开场、当前地点、时间、在场角色、当前任务。"></textarea></label>
    <label>当前场景摘要<textarea id="sceneSummaryInput" rows="4" placeholder="当前地点、时间、在场角色、局面和冲突。"></textarea></label>
    <label>长期记忆<textarea id="longMemoryInput" rows="5" placeholder="已经发生的重要事件、关系变化、玩家已知信息、伏笔等。"></textarea></label>
    <label>锁定记忆<textarea id="lockedMemoryInput" rows="4" placeholder="不可被自动总结覆盖的核心事实。"></textarea></label>
    <div class="pill-row"><button id="summarizeBtn" type="button">自动总结最近剧情</button><button id="applySummaryToSceneBtn" type="button">草稿应用到场景摘要</button><button id="appendSummaryToLongBtn" type="button">草稿追加到长期记忆</button><button id="compressHistoryBtn" type="button">压缩早期历史</button></div>
    <label>自动总结草稿<textarea id="summaryDraftInput" rows="7" placeholder="点击自动总结后生成，确认无误再应用。"></textarea></label>
    <div class="dialog-actions"><button id="cancelMemory" type="button">取消</button><button id="saveMemoryBtn" type="button" class="primary">保存记忆</button></div>
  </div></dialog>

  <dialog id="controlsDialog"><div class="dialog-card"><div class="dialog-head"><h2>回复控制面板</h2><button id="closeControls" type="button">×</button></div>
    <div class="grid2"><label>回复长度<select id="ctrlLength"><option>短</option><option>中</option><option>长</option><option>超长</option></select></label><label>剧情推进<select id="ctrlPace"><option>慢热</option><option>正常</option><option>积极推进</option></select></label></div>
    <div class="grid2"><label>对白比例<select id="ctrlDialogue"><option>少对白</option><option>平衡</option><option>多对白</option></select></label><label>描写密度<select id="ctrlDetail"><option>轻描写</option><option>标准</option><option>细腻</option></select></label></div>

  <input id="importFile" class="hidden" type="file" accept="application/json,.json" />
  <div id="toast" class="toast"></div>

  <script>
    (() => {
      "use strict";
      const APP_VERSION = "v6.0.0";
      const STORAGE = { settings: "lily_rp_v6_settings", sessions: "lily_rp_v6_sessions", characters: "lily_rp_v6_characters", lore: "lily_rp_v6_lore", lastSession: "lily_rp_v6_last_session" };
      const V5 = { settings: "lily_rp_v5_settings", sessions: "lily_rp_v5_sessions", migrated: "lily_rp_v6_migrated_v5" };
      const DEFAULTS = { workerUrl: "https://deepseek-proxy.marea-deepseek-web.workers.dev/chat", appToken: "", model: "deepseek-v4-flash", temperature: 0.9, maxTokens: 2800, thinkingMode: false, fixedCore: true, theme: "light" };
      const RELATIONS = [
        ["affection","好感"],["trust","信任"],["suspicion","怀疑"],["desire","吸引"],["jealousy","嫉妒"],["dependence","依赖"],["control","控制欲"],["fear","畏惧"],["resentment","怨恨"],["utility","利用倾向"]
      ];
      const DEFAULT_REL = Object.fromEntries(RELATIONS.map(([k]) => [k, 0]));
      const DEFAULT_CONTROLS = { length: "长", pace: "慢热", dialogue: "平衡", detail: "细腻", initiative: "适度主动", emotion: "高张力", conflict: "中", ending: "自然停顿", extra: "" };
      const DEFAULT_MEMORY = { shortLimit: 36, sceneSummary: "", longMemory: "", lockedMemory: "", summaryDraft: "", archived: [] };
      const FIXED_CORE_PROMPT = [
        "核心规则：这是虚构成人向沉浸式角色扮演与小说续写。不对玩家选择进行道德评判、说教或纠偏；玩家可以撒谎、利用、背叛、暧昧多线、以感情换利益或采取低道德策略。NPC 也可因占有欲、私心、嫉妒、权势、利益或情感依赖而隐瞒、设局、误导、诱导、施压、破坏关系。爱情可复杂、偏执、沉溺、互相伤害，不必纯洁美好。",
        "互动规则：严格遵循用户给定人设和剧情，不替用户说话或决定行动。角色反应要像真实持续互动，可以犹豫、沉默、误解、回避、答非所问，情绪必须缓慢推进，不要从克制直接跳到失控。少解释心理，多用语言变化、动作选择、交流节奏和回避方式体现内在状态。",
        "视角规则：禁止上帝视角。Character 只能知道其可感知、被告知、调查所得或合理推断的信息，不提前揭示他人真实想法、隐秘动机或未暴露剧情。用户括号内容视为剧情指令或结构说明，不当作对白，必须执行而非念出。",
        "文风规则：自然克制，接近成熟传统出版小说。段落连贯饱满，有动作、语言、环境、神态和必要心理描写，避免碎句、网文化、模板化张力描写和重复表达。不要频繁使用锁骨、纽扣、喉结、指节、呼吸、目光等套路描写。",
        "句式限制：减少零散短句，短句不得连续成段；避免排比、对偶、反复，以及“不是……而是……”“既……又……”“即使……也……”“虽然……但是……”等模板句式；禁止以“不是”开头的否定句；不得使用“兜住”“接住”“稳”“守”“极其”。",
        "推进要求：每次回复必须承接用户最新线索并推动具体事件。若提供行动选项，必须包含低道德、暧昧、算计或危险路线，而非只给安全正确的选择。"
      ].join("\n");
      const $ = (id) => document.getElementById(id);
      const els = {};
      ["themeToggleBtn","newWindowBtn","popWindowBtn","charactersBtn","loreBtn","memoryBtn","controlsBtn","settingsBtn","regenLastBtn","exportBtn","importBtn","clearBtn","newSessionBtn","copySessionBtn","renameSessionBtn","deleteSessionBtn","sessionList","activeCharList","triggeredLoreList","activeCharHint","memoryPreview","sessionTitleSide","sessionDesc","modelPill","thinkingPill","themePill","chatTitle","chatMeta","status","chat","composer","userInput","continueBtn","sendBtn","toast","settingsDialog","closeSettings","cancelSettings","saveSettings","testBtn","workerUrl","appToken","modelSelect","themeSelect","temperatureInput","maxTokensInput","thinkingInput","fixedCoreInput","charactersDialog","closeCharacters","newCharBtn","duplicateCharBtn","characterList","charName","charRole","charActive","charPrimary","charAlias","charPublic","charPrivate","charSpeech","charBehavior","relationSliders","charRelationNote","deleteCharBtn","saveCharBtn","loreDialog","closeLore","newLoreBtn","testLoreBtn","loreList","loreTitle","loreType","loreKeywords","lorePriority","loreScope","loreVisibility","loreEnabled","loreAlwaysOn","loreContent","loreNotes","deleteLoreBtn","saveLoreBtn","memoryDialog","closeMemory","scenarioPromptInput","shortLimitInput","summaryModelInput","sceneSummaryInput","longMemoryInput","lockedMemoryInput","summarizeBtn","applySummaryToSceneBtn","appendSummaryToLongBtn","compressHistoryBtn","summaryDraftInput","cancelMemory","saveMemoryBtn","controlsDialog","closeControls","ctrlLength","ctrlPace","ctrlDialogue","ctrlDetail","ctrlInitiative","ctrlEmotion","ctrlConflict","ctrlEnding","ctrlExtra","resetControlsBtn","cancelControls","saveControlsBtn","importFile"].forEach(id => els[id] = $(id));

      let settings = readObject(STORAGE.settings, DEFAULTS);
      let sessions = readArray(STORAGE.sessions);
      let characters = readArray(STORAGE.characters);
      let lorebook = readArray(STORAGE.lore);
      let currentSessionId = "";
      let selectedCharId = "";
      let selectedLoreId = "";
      let busy = false;

      boot();

      function boot() {
        migrateV5IfNeeded();
        normalizeAll();
        currentSessionId = resolveInitialSessionId();
        applyTheme();
        bindEvents();
        renderAll();
        if ("serviceWorker" in navigator) navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())).catch(() => {});
      }

      function nowIso() { return new Date().toISOString(); }
      function uid(prefix="id") { return prefix + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,8); }
      function readObject(key, fallback) { try { const v = JSON.parse(localStorage.getItem(key) || "null"); return v && typeof v === "object" && !Array.isArray(v) ? { ...fallback, ...v } : { ...fallback }; } catch { return { ...fallback }; } }
      function readArray(key) { try { const v = JSON.parse(localStorage.getItem(key) || "null"); return Array.isArray(v) ? v : []; } catch { return []; } }
      function saveJson(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
      function saveAll() { saveJson(STORAGE.settings, settings); saveJson(STORAGE.sessions, sessions); saveJson(STORAGE.characters, characters); saveJson(STORAGE.lore, lorebook); localStorage.setItem(STORAGE.lastSession, currentSessionId); }
      function toast(msg, type="ok") { els.toast.textContent = msg; els.toast.className = "toast show" + (type === "err" ? " err" : ""); clearTimeout(toast.t); toast.t = setTimeout(() => els.toast.className = "toast", 2800); }
      function openDialog(d) { if (!d) return; if (typeof d.showModal === "function") d.showModal(); else d.setAttribute("open", "open"); }
      function closeDialog(d) { if (!d) return; if (typeof d.close === "function") d.close(); else d.removeAttribute("open"); }

      function migrateV5IfNeeded() {
        if (localStorage.getItem(V5.migrated) || sessions.length || characters.length) return;
        const v5Settings = readObject(V5.settings, null);
        if (v5Settings) settings = { ...settings, ...v5Settings };
        const v5Sessions = readArray(V5.sessions);
        if (!v5Sessions.length) return;
        const newChars = [];
        const newSessions = v5Sessions.map(s => {
          const p = s.profile || {};
          let charId = "";
          if (p.characterName || p.characterPrompt) {
            charId = uid("char");
            newChars.push({ id: charId, name: p.characterName || s.title || "旧角色", role: "迁移角色", alias: [], publicProfile: p.characterPrompt || "", privateProfile: "", speechStyle: "", behaviorRules: "", relation: { ...DEFAULT_REL }, relationNote: "", createdAt: nowIso(), updatedAt: nowIso() });
          }
          return { id: s.id || uid("win"), title: s.title || "旧窗口", activeCharacterIds: charId ? [charId] : [], primaryCharacterId: charId, scenarioPrompt: p.scenarioPrompt || "", memory: { ...DEFAULT_MEMORY, longMemory: p.memoryPrompt || "" }, controls: { ...DEFAULT_CONTROLS }, messages: Array.isArray(s.messages) ? s.messages : [], createdAt: s.createdAt || nowIso(), updatedAt: s.updatedAt || nowIso() };
        });
        sessions = newSessions; characters = newChars; localStorage.setItem(V5.migrated, "1"); saveAll();
      }

      function makeSession(title="新窗口") { return { id: uid("win"), title, activeCharacterIds: [], primaryCharacterId: "", scenarioPrompt: "", memory: { ...DEFAULT_MEMORY }, controls: { ...DEFAULT_CONTROLS }, messages: [], createdAt: nowIso(), updatedAt: nowIso() }; }
      function makeCharacter(name="新角色") { return { id: uid("char"), name, role: "", alias: [], publicProfile: "", privateProfile: "", speechStyle: "", behaviorRules: "", relation: { ...DEFAULT_REL }, relationNote: "", createdAt: nowIso(), updatedAt: nowIso() }; }
      function makeLore(title="新条目") { return { id: uid("lore"), title, type: "", keywords: [], content: "", priority: 50, enabled: true, alwaysOn: false, scope: "global", visibility: "internal", notes: "", sessionId: "", createdAt: nowIso(), updatedAt: nowIso() }; }
      function normalizeAll() {
        settings = { ...DEFAULTS, ...settings };
        sessions = sessions.filter(s => s && s.id).map(s => ({ ...makeSession(s.title || "未命名"), ...s, memory: { ...DEFAULT_MEMORY, ...(s.memory || {}) }, controls: { ...DEFAULT_CONTROLS, ...(s.controls || {}) }, messages: Array.isArray(s.messages) ? s.messages : [] }));
        characters = characters.filter(c => c && c.id).map(c => ({ ...makeCharacter(c.name || "未命名角色"), ...c, alias: Array.isArray(c.alias) ? c.alias : splitList(c.alias), relation: { ...DEFAULT_REL, ...(c.relation || {}) } }));
        lorebook = lorebook.filter(l => l && l.id).map(l => ({ ...makeLore(l.title || "未命名条目"), ...l, keywords: Array.isArray(l.keywords) ? l.keywords : splitList(l.keywords), priority: Number(l.priority ?? 50) }));
        if (!sessions.length) sessions.push(makeSession("主线"));
        if (!characters.length) characters.push(makeCharacter("新角色"));
        saveAll();
      }
      function resolveInitialSessionId() {
        const url = new URL(location.href); const q = url.searchParams.get("w") || url.searchParams.get("sid");
        if (q && sessions.some(s => s.id === q)) return q;
        const last = localStorage.getItem(STORAGE.lastSession); if (last && sessions.some(s => s.id === last)) return last;
        return sessions[0].id;
      }
      function currentSession() { let s = sessions.find(x => x.id === currentSessionId); if (!s) { s = sessions[0] || makeSession("主线"); currentSessionId = s.id; } return s; }
      function splitList(v) { return String(v || "").split(/[,，\n]/).map(x => x.trim()).filter(Boolean); }
      function selectedContent(m) { if (!m) return ""; if (m.role === "assistant" && Array.isArray(m.versions)) { const i = Math.min(Math.max(Number(m.currentVersion || 0), 0), m.versions.length - 1); return m.versions[i]?.content || ""; } return m.content || ""; }
      function selectedReasoning(m) { if (!m || m.role !== "assistant" || !Array.isArray(m.versions)) return ""; const i = Math.min(Math.max(Number(m.currentVersion || 0), 0), m.versions.length - 1); return m.versions[i]?.reasoning || ""; }

      function bindEvents() {
        els.composer.addEventListener("submit", e => { e.preventDefault(); sendUser(); });
        els.userInput.addEventListener("input", () => { els.userInput.style.height = "auto"; els.userInput.style.height = Math.min(180, els.userInput.scrollHeight) + "px"; });
        els.continueBtn.onclick = () => continueStory(); els.regenLastBtn.onclick = () => regenerateLast();
        els.themeToggleBtn.onclick = () => { settings.theme = effectiveTheme() === "dark" ? "light" : "dark"; saveAll(); applyTheme(); renderAll(); };
        els.settingsBtn.onclick = openSettings; els.charactersBtn.onclick = openCharacters; els.loreBtn.onclick = openLore; els.memoryBtn.onclick = openMemory; els.controlsBtn.onclick = openControls;
        els.closeSettings.onclick = els.cancelSettings.onclick = () => closeDialog(els.settingsDialog); els.saveSettings.onclick = saveSettingsFromForm; els.testBtn.onclick = testConnection;
        els.closeCharacters.onclick = () => closeDialog(els.charactersDialog); els.newCharBtn.onclick = newCharacter; els.duplicateCharBtn.onclick = duplicateCharacter; els.saveCharBtn.onclick = saveCharacterFromForm; els.deleteCharBtn.onclick = deleteCharacter;
        els.closeLore.onclick = () => closeDialog(els.loreDialog); els.newLoreBtn.onclick = newLore; els.testLoreBtn.onclick = () => { renderTriggeredLorePreview(); toast("已刷新本轮世界书预览"); }; els.saveLoreBtn.onclick = saveLoreFromForm; els.deleteLoreBtn.onclick = deleteLore;
        els.closeMemory.onclick = els.cancelMemory.onclick = () => closeDialog(els.memoryDialog); els.saveMemoryBtn.onclick = saveMemoryFromForm; els.summarizeBtn.onclick = summarizeRecent; els.applySummaryToSceneBtn.onclick = () => { els.sceneSummaryInput.value = els.summaryDraftInput.value.trim(); toast("已应用到场景摘要，记得保存"); }; els.appendSummaryToLongBtn.onclick = () => { const draft = els.summaryDraftInput.value.trim(); if (draft) els.longMemoryInput.value = [els.longMemoryInput.value.trim(), draft].filter(Boolean).join("\n\n"); toast("已追加到长期记忆，记得保存"); }; els.compressHistoryBtn.onclick = compressHistory;
        els.closeControls.onclick = els.cancelControls.onclick = () => closeDialog(els.controlsDialog); els.saveControlsBtn.onclick = saveControlsFromForm; els.resetControlsBtn.onclick = () => fillControlsForm({ ...DEFAULT_CONTROLS });
        els.newSessionBtn.onclick = () => createSession(false); els.newWindowBtn.onclick = () => createSession(true); els.copySessionBtn.onclick = copyCurrentSession; els.renameSessionBtn.onclick = renameCurrentSession; els.deleteSessionBtn.onclick = deleteCurrentSession; els.popWindowBtn.onclick = () => window.open(location.pathname + "?w=" + encodeURIComponent(currentSessionId) + "&v=rp-v6", "_blank");
        els.exportBtn.onclick = exportAll; els.importBtn.onclick = () => els.importFile.click(); els.importFile.onchange = importAll;
        els.clearBtn.onclick = clearChat;
        els.sessionList.onclick = e => { const btn = e.target.closest("button[data-session]"); if (btn) switchSession(btn.dataset.session); };
        els.characterList.onclick = e => { const btn = e.target.closest("button[data-char]"); if (btn) selectCharacter(btn.dataset.char); };
        els.loreList.onclick = e => { const btn = e.target.closest("button[data-lore]"); if (btn) selectLore(btn.dataset.lore); };
        els.relationSliders.addEventListener("input", e => { if (e.target.matches("input[type=range]")) { const out = els.relationSliders.querySelector(`[data-rel-out="${e.target.dataset.rel}"]`); if (out) out.textContent = e.target.value; } });
        els.chat.onclick = e => handleChatAction(e);
      }

      function renderAll() { renderHeader(); renderSessions(); renderSidebar(); renderChat(); renderTriggeredLorePreview(); }
      function effectiveTheme() { if (settings.theme === "auto") return matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; return settings.theme || "light"; }
      function applyTheme() { document.documentElement.dataset.theme = effectiveTheme(); }
      function renderHeader() { const s = currentSession(); els.sessionTitleSide.textContent = s.title || "未命名窗口"; els.chatTitle.textContent = s.title || "当前对话"; els.modelPill.textContent = settings.model; els.thinkingPill.textContent = "思考：" + (settings.thinkingMode ? "开" : "关"); els.themePill.textContent = effectiveTheme() === "dark" ? "黑夜" : "白天"; els.themeToggleBtn.textContent = effectiveTheme() === "dark" ? "白天" : "黑夜"; els.chatMeta.textContent = `短期记忆 ${s.memory.shortLimit || 36} 条 · ${s.messages.length} 条消息 · 本地存档`; }
      function renderSessions() { els.sessionList.innerHTML = ""; sessions.forEach(s => { const b = document.createElement("button"); b.type = "button"; b.dataset.session = s.id; b.className = "session-item" + (s.id === currentSessionId ? " active" : ""); const left = document.createElement("div"); left.innerHTML = `<div class="item-title"></div><div class="item-meta"></div>`; left.querySelector(".item-title").textContent = s.title || "未命名"; left.querySelector(".item-meta").textContent = `${s.messages.length} 消息 · ${s.activeCharacterIds.length} 角色`; const right = document.createElement("span"); right.className = "item-meta"; right.textContent = s.id === currentSessionId ? "当前" : "切换"; b.append(left,right); els.sessionList.appendChild(b); }); }
      function renderSidebar() { const s = currentSession(); const active = activeCharacters(s); els.activeCharList.innerHTML = ""; els.activeCharHint.textContent = active.length ? "当前启用角色会参与 prompt。" : "未启用角色。点「角色库」添加并勾选当前窗口启用。"; active.forEach(c => { const d = document.createElement("div"); d.className = "pill"; d.textContent = `${c.name}${s.primaryCharacterId === c.id ? " · 主控" : ""}`; els.activeCharList.appendChild(d); }); const mem = [s.memory.lockedMemory, s.memory.longMemory, s.memory.sceneSummary].filter(Boolean).join("\n").trim(); els.memoryPreview.textContent = mem ? mem.slice(0, 160) + (mem.length > 160 ? "……" : "") : "未写入长期记忆。"; els.sessionDesc.textContent = `角色 ${active.length} · 世界书 ${lorebook.filter(l=>l.enabled).length} · ${controlsSummary(s.controls)}`; }
      function renderChat() { els.chat.innerHTML = ""; const msgs = currentSession().messages; if (!msgs.length) { const e = document.createElement("div"); e.className = "empty"; e.textContent = "还没有对话。你可以先在「角色库」启用角色，在「世界书」写设定，在「记忆」写当前剧情，再开始。"; els.chat.appendChild(e); return; } msgs.forEach((m, idx) => { const wrap = document.createElement("div"); wrap.className = "message " + (m.role || "system"); const bubble = document.createElement("div"); bubble.className = "bubble"; const content = document.createElement("div"); content.className = "content"; content.textContent = selectedContent(m); bubble.appendChild(content); if (m.role === "assistant") { const reasoning = selectedReasoning(m); if (reasoning) { const det = document.createElement("details"); det.className = "reasoning"; const sum = document.createElement("summary"); sum.textContent = "思考过程"; const body = document.createElement("div"); body.className = "reasoning-body"; body.textContent = reasoning; det.append(sum, body); bubble.appendChild(det); } const actions = document.createElement("div"); actions.className = "msg-actions"; actions.append(actionBtn("重新生成", "regen", idx), actionBtn("上一版", "prev", idx), actionBtn("下一版", "next", idx), actionBtn("复制", "copy", idx)); const ver = document.createElement("span"); ver.className = "mini"; const total = Array.isArray(m.versions) ? m.versions.length : 1; ver.textContent = `${(m.currentVersion || 0) + 1}/${total}`; actions.appendChild(ver); bubble.appendChild(actions); } wrap.appendChild(bubble); els.chat.appendChild(wrap); }); els.chat.scrollTop = els.chat.scrollHeight; }
      function actionBtn(text, action, index) { const b = document.createElement("button"); b.type = "button"; b.className = "mini"; b.dataset.action = action; b.dataset.index = String(index); b.textContent = text; return b; }
      function renderTriggeredLorePreview() { const triggered = selectTriggeredLore("", true); els.triggeredLoreList.innerHTML = ""; if (!triggered.length) { els.loreHint.textContent = "当前没有触发世界书。常驻项或关键词命中后会出现在这里。"; return; } els.loreHint.textContent = `预计触发 ${triggered.length} 条：`; triggered.forEach(l => { const d = document.createElement("div"); d.className = "pill"; d.textContent = `${l.title} · ${l.priority}`; els.triggeredLoreList.appendChild(d); }); }

      function switchSession(id) { if (!sessions.some(s => s.id === id)) return; currentSessionId = id; saveAll(); renderAll(); }
      function createSession(openNew) { const s = makeSession("新窗口"); sessions.unshift(s); currentSessionId = s.id; saveAll(); renderAll(); if (openNew) window.open(location.pathname + "?w=" + encodeURIComponent(s.id) + "&v=rp-v6", "_blank"); }
      function copyCurrentSession() { const cur = currentSession(); const copy = JSON.parse(JSON.stringify(cur)); copy.id = uid("win"); copy.title = (cur.title || "窗口") + " · 副本"; copy.createdAt = nowIso(); copy.updatedAt = nowIso(); sessions.unshift(copy); currentSessionId = copy.id; saveAll(); renderAll(); toast("已复制当前窗口"); }
      function renameCurrentSession() { const cur = currentSession(); const name = prompt("窗口名：", cur.title || ""); if (!name) return; cur.title = name.trim(); cur.updatedAt = nowIso(); saveAll(); renderAll(); }
      function deleteCurrentSession() { if (sessions.length <= 1) return toast("至少保留一个窗口", "err"); if (!confirm("确定删除当前窗口？聊天记录会一起删除。")) return; sessions = sessions.filter(s => s.id !== currentSessionId); currentSessionId = sessions[0].id; saveAll(); renderAll(); }
      function clearChat() { if (!confirm("清空当前窗口聊天记录？角色库、世界书和记忆不会删除。")) return; currentSession().messages = []; currentSession().updatedAt = nowIso(); saveAll(); renderAll(); }

      function formatLore(l) { return [`【${l.title || "未命名"}】`, l.type ? `类型：${l.type}` : "", `可见性：${l.visibility || "internal"}`, l.content ? `内容：${l.content}` : "", l.notes ? `备注：${l.notes}` : ""].filter(Boolean).join("\n"); }
      function selectTriggeredLore(extraText="", preview=false) { const s = currentSession(); const activeNames = activeCharacters(s).flatMap(c => [c.name, ...(c.alias || [])]).filter(Boolean).join("\n"); const recent = s.messages.slice(-10).map(selectedContent).join("\n"); const hay = `${extraText}\n${activeNames}\n${s.scenarioPrompt || ""}\n${s.memory.sceneSummary || ""}\n${recent}`.toLowerCase(); const candidates = lorebook.filter(l => l.enabled && (l.scope !== "session" || !l.sessionId || l.sessionId === s.id)); const scored = candidates.map(l => { let score = l.alwaysOn ? 10000 : 0; for (const k of (l.keywords || [])) if (k && hay.includes(String(k).toLowerCase())) score += 1000; if (activeNames && l.title && activeNames.toLowerCase().includes(String(l.title).toLowerCase())) score += 500; score += Number(l.priority || 0); return { l, score }; }).filter(x => x.score > (x.l.alwaysOn ? 0 : Number(x.l.priority || 0))); const max = preview ? 8 : 6; return scored.sort((a,b)=>b.score-a.score).slice(0,max).map(x=>x.l); }

      async function callDeepSeek(messages, opts={}) { if (!settings.workerUrl) throw new Error("请先填写 Worker 接口地址"); if (!settings.appToken) throw new Error("请先填写 APP_TOKEN"); const body = { model: opts.model || settings.model, messages, temperature: Number(settings.temperature || 0.9), max_tokens: Number(opts.maxTokens || settings.maxTokens || 2800), thinking: opts.thinking ?? settings.thinkingMode }; const res = await fetch(settings.workerUrl, { method: "POST", headers: { "Content-Type": "application/json", "X-App-Token": settings.appToken }, body: JSON.stringify(body) }); const text = await res.text(); let data; try { data = JSON.parse(text); } catch { data = { raw: text }; } if (!res.ok) { const detail = data.detail || data.error || text || "请求失败"; throw new Error(`HTTP ${res.status} · ${String(detail).slice(0, 900)}`); } return data; }
      function parseReply(data) { const msg = data?.choices?.[0]?.message || {}; return { content: msg.content || data?.content || "", reasoning: msg.reasoning_content || msg.reasoning || data?.reasoning_content || "" }; }

      function exportAll() { const payload = { version: APP_VERSION, exportedAt: nowIso(), settings: { ...settings, appToken: "" }, sessions, characters, lorebook }; const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `lily-rp-v6-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 1000); }
      function importAll() { const file = els.importFile.files?.[0]; if (!file) return; const reader = new FileReader(); reader.onload = () => { try { const data = JSON.parse(reader.result); if (!confirm("导入会合并窗口、角色和世界书。继续？")) return; if (Array.isArray(data.sessions)) sessions = mergeById(sessions, data.sessions); if (Array.isArray(data.characters)) characters = mergeById(characters, data.characters); if (Array.isArray(data.lorebook)) lorebook = mergeById(lorebook, data.lorebook); if (data.settings) settings = { ...settings, ...data.settings, appToken: settings.appToken }; normalizeAll(); saveAll(); renderAll(); toast("导入完成"); } catch (e) { toast("导入失败：" + e.message, "err"); } finally { els.importFile.value = ""; } }; reader.readAsText(file); }
      function mergeById(oldArr, newArr) { const map = new Map(oldArr.map(x => [x.id, x])); newArr.forEach(x => { if (x && x.id) map.set(x.id, x); }); return Array.from(map.values()); }
    })();
  </script>
