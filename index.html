<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DeepSeek RP Web</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="RP Web" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary2: #1d4ed8;
      --bubble-user: #2563eb;
      --bubble-ai: #ffffff;
      --danger: #ef4444;
      --shadow: 0 10px 30px rgba(17, 24, 39, .08);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    button, input, textarea, select { font: inherit; }
    button {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 9px 13px;
      cursor: pointer;
      transition: .15s ease;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(17,24,39,.08); }
    button.primary { border-color: var(--primary); background: var(--primary); color: white; }
    button.primary:hover { background: var(--primary2); }
    button.danger { color: var(--danger); border-color: #fecaca; }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }

    .app {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      max-width: 980px;
      margin: 0 auto;
      padding: 14px;
      gap: 12px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .title h1 { margin: 0; font-size: 22px; line-height: 1.15; }
    .title p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .chat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      overflow-y: auto;
      min-height: 360px;
    }
    .empty {
      height: 100%;
      min-height: 360px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: var(--muted);
      gap: 8px;
    }
    .empty strong { color: var(--text); font-size: 22px; }
    .msg {
      display: flex;
      margin: 12px 0;
    }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: min(760px, 86%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px 14px;
      white-space: pre-wrap;
      line-height: 1.65;
      word-break: break-word;
      box-shadow: 0 4px 14px rgba(17,24,39,.04);
    }
    .user .bubble { background: var(--bubble-user); color: white; border-color: var(--bubble-user); border-bottom-right-radius: 6px; }
    .assistant .bubble { background: var(--bubble-ai); color: var(--text); border-bottom-left-radius: 6px; }
    .note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin: 10px 0;
    }
    .note.error { color: var(--danger); }
    .composer {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #userInput {
      flex: 1;
      min-height: 46px;
      max-height: 180px;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      outline: none;
      background: #fbfdff;
    }
    #userInput:focus { border-color: #93c5fd; box-shadow: 0 0 0 4px rgba(37,99,235,.1); }
    .composerBtns { display: flex; gap: 8px; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17,24,39,.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 100;
    }
    .overlay.open { display: flex; }
    .modal {
      width: min(760px, 100%);
      max-height: min(86vh, 820px);
      overflow-y: auto;
      background: #fff;
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 30px 80px rgba(17,24,39,.25);
      padding: 18px;
    }
    .modalHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .modalHeader h2 { margin: 0; font-size: 20px; }
    .formGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: grid; gap: 6px; margin: 10px 0; color: var(--muted); font-size: 13px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 12px;
      color: var(--text);
      background: #fff;
      outline: none;
    }
    textarea { resize: vertical; min-height: 84px; }
    input:focus, textarea:focus, select:focus { border-color: #93c5fd; box-shadow: 0 0 0 4px rgba(37,99,235,.1); }
    .check { display: flex; grid-template-columns: auto 1fr; align-items: center; gap: 8px; }
    .check input { width: auto; }
    .modalActions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 14px; }
    .small { font-size: 12px; color: var(--muted); }

    @media (max-width: 720px) {
      .app { padding: 8px; gap: 8px; }
      .topbar { align-items: flex-start; flex-direction: column; border-radius: 18px; }
      .actions { justify-content: flex-start; }
      .chat { border-radius: 18px; padding: 12px; }
      .composer { border-radius: 18px; flex-direction: column; align-items: stretch; }
      .composerBtns { justify-content: flex-end; }
      .formGrid { grid-template-columns: 1fr; }
      .bubble { max-width: 94%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title">
        <h1 id="pageTitle">DeepSeek RP Web</h1>
        <p id="subtitle">纯白简洁版 · 角色扮演 / 酒馆 / 剧情聊天</p>
      </div>
      <div class="actions">
        <button id="characterBtn" type="button">角色卡</button>
        <button id="settingsBtn" type="button">设置</button>
        <button id="exportBtn" type="button">导出</button>
        <button id="clearBtn" class="danger" type="button">清空</button>
      </div>
    </header>

    <main id="chat" class="chat"></main>

    <form id="composer" class="composer">
      <textarea id="userInput" rows="1" placeholder="输入你的台词、动作或剧情……"></textarea>
      <div class="composerBtns">
        <button id="continueBtn" type="button">续写</button>
        <button id="sendBtn" class="primary" type="submit">发送</button>
      </div>
    </form>
  </div>

  <div id="settingsOverlay" class="overlay" aria-hidden="true">
    <section class="modal">
      <div class="modalHeader">
        <h2>设置</h2>
        <button id="closeSettings" type="button">关闭</button>
      </div>
      <label>Worker 接口地址
        <input id="workerUrl" placeholder="https://xxx.workers.dev/chat" />
      </label>
      <label>APP_TOKEN
        <input id="appToken" type="password" placeholder="你自己在 Cloudflare 设置的 APP_TOKEN" />
      </label>
      <div class="formGrid">
        <label>模型
          <select id="model">
            <option value="deepseek-v4-flash">deepseek-v4-flash</option>
            <option value="deepseek-v4-pro">deepseek-v4-pro</option>
          </select>
        </label>
        <label>Temperature
          <input id="temperature" type="number" min="0" max="2" step="0.1" />
        </label>
      </div>
      <label>Max Tokens
        <input id="maxTokens" type="number" min="256" max="4000" step="100" />
      </label>
      <label class="check">
        <input id="thinking" type="checkbox" />
        开启思考模式
      </label>
      <p class="small">APP_TOKEN 不是 DeepSeek API Key，是你自己设置的网页访问密码。DeepSeek API Key 仍保存在 Cloudflare Worker Secret 里。</p>
      <div class="modalActions">
        <button id="testBtn" type="button">测试连接</button>
        <button id="saveSettings" class="primary" type="button">保存</button>
      </div>
    </section>
  </div>

  <div id="characterOverlay" class="overlay" aria-hidden="true">
    <section class="modal">
      <div class="modalHeader">
        <h2>角色卡</h2>
        <button id="closeCharacter" type="button">关闭</button>
      </div>
      <div class="formGrid">
        <label>角色名
          <input id="characterName" placeholder="例如：莉莉娅" />
        </label>
        <label>你的昵称
          <input id="playerName" placeholder="例如：旅人" />
        </label>
      </div>
      <label>角色设定
        <textarea id="characterPrompt" placeholder="写角色身份、性格、说话方式、关系、禁忌等。"></textarea>
      </label>
      <label>场景设定
        <textarea id="scenarioPrompt" placeholder="写世界观、地点、当前剧情、开场等。"></textarea>
      </label>
      <label>长期记忆
        <textarea id="memoryPrompt" placeholder="写已经发生的重要事件、关系变化、约定等。"></textarea>
      </label>
      <label>回复风格
        <textarea id="stylePrompt" placeholder="例如：沉浸式描写；不要替用户发言；每次回复 2-6 段。"></textarea>
      </label>
      <div class="modalActions">
        <button id="saveCharacter" class="primary" type="button">保存角色卡</button>
      </div>
    </section>
  </div>

  <script>
    // 删除旧版本 Service Worker，避免旧 app.js/style.css 缓存影响当前页面
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations?.().then(regs => regs.forEach(reg => reg.unregister())).catch(() => {});
    }

    const DEFAULTS = {
      workerUrl: "https://deepseek-proxy.marea-deepseek-web.workers.dev/chat",
      model: "deepseek-v4-flash",
      temperature: 0.9,
      maxTokens: 2800,
      thinking: false,
      stylePrompt: "沉浸式角色扮演；描写有画面感；保持角色性格一致；不要替用户说话或替用户做决定；每次回复 2-6 段。"
    };

    const $ = (id) => document.getElementById(id);
    const chatEl = $("chat");
    const composer = $("composer");
    const userInput = $("userInput");
    const sendBtn = $("sendBtn");
    const continueBtn = $("continueBtn");

    let messages = JSON.parse(localStorage.getItem("rp_messages_v3") || "[]");

    function getSettings() {
      return {
        workerUrl: localStorage.getItem("rp_workerUrl") || DEFAULTS.workerUrl,
        appToken: localStorage.getItem("rp_appToken") || "",
        model: localStorage.getItem("rp_model") || DEFAULTS.model,
        temperature: Number(localStorage.getItem("rp_temperature") || DEFAULTS.temperature),
        maxTokens: Number(localStorage.getItem("rp_maxTokens") || DEFAULTS.maxTokens),
        thinking: localStorage.getItem("rp_thinking") === "true",
        characterName: localStorage.getItem("rp_characterName") || "",
        playerName: localStorage.getItem("rp_playerName") || "",
        characterPrompt: localStorage.getItem("rp_characterPrompt") || "",
        scenarioPrompt: localStorage.getItem("rp_scenarioPrompt") || "",
        memoryPrompt: localStorage.getItem("rp_memoryPrompt") || "",
        stylePrompt: localStorage.getItem("rp_stylePrompt") || DEFAULTS.stylePrompt
      };
    }

    function setText() {
      const s = getSettings();
      $("pageTitle").textContent = s.characterName ? `${s.characterName} · RP Web` : "DeepSeek RP Web";
      $("subtitle").textContent = s.appToken ? `已连接 · ${s.model}` : "未连接 · 点“设置”填写 APP_TOKEN";
    }

    function saveMessages() {
      localStorage.setItem("rp_messages_v3", JSON.stringify(messages.slice(-80)));
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
    }

    function render() {
      setText();
      chatEl.innerHTML = "";
      if (!messages.length) {
        const s = getSettings();
        chatEl.innerHTML = `
          <div class="empty">
            <strong>${s.characterName ? `和 ${escapeHtml(s.characterName)} 开始一段剧情` : "开始你的 RP 剧情"}</strong>
            <span>先点“角色卡”写设定，再点“设置”填写 APP_TOKEN。</span>
            <span>也可以直接输入一句开场白测试。</span>
          </div>`;
        return;
      }
      for (const msg of messages) {
        addBubble(msg.role, msg.content, false);
      }
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addBubble(role, content, scroll = true) {
      const wrap = document.createElement("div");
      wrap.className = `msg ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;
      wrap.appendChild(bubble);
      chatEl.appendChild(wrap);
      if (scroll) chatEl.scrollTop = chatEl.scrollHeight;
      return wrap;
    }

    function addNote(text, type = "") {
      const note = document.createElement("div");
      note.className = `note ${type}`;
      note.textContent = text;
      chatEl.appendChild(note);
      chatEl.scrollTop = chatEl.scrollHeight;
      return note;
    }

    function openOverlay(id) {
      $(id).classList.add("open");
      $(id).setAttribute("aria-hidden", "false");
    }
    function closeOverlay(id) {
      $(id).classList.remove("open");
      $(id).setAttribute("aria-hidden", "true");
    }

    function fillSettings() {
      const s = getSettings();
      $("workerUrl").value = s.workerUrl;
      $("appToken").value = s.appToken;
      $("model").value = s.model;
      $("temperature").value = s.temperature;
      $("maxTokens").value = s.maxTokens;
      $("thinking").checked = s.thinking;
    }

    function fillCharacter() {
      const s = getSettings();
      $("characterName").value = s.characterName;
      $("playerName").value = s.playerName;
      $("characterPrompt").value = s.characterPrompt;
      $("scenarioPrompt").value = s.scenarioPrompt;
      $("memoryPrompt").value = s.memoryPrompt;
      $("stylePrompt").value = s.stylePrompt;
    }

    function saveSettingsFromForm() {
      localStorage.setItem("rp_workerUrl", $("workerUrl").value.trim());
      localStorage.setItem("rp_appToken", $("appToken").value.trim());
      localStorage.setItem("rp_model", $("model").value);
      localStorage.setItem("rp_temperature", String(Number($("temperature").value || DEFAULTS.temperature)));
      localStorage.setItem("rp_maxTokens", String(Number($("maxTokens").value || DEFAULTS.maxTokens)));
      localStorage.setItem("rp_thinking", String($("thinking").checked));
      closeOverlay("settingsOverlay");
      render();
    }

    function saveCharacterFromForm() {
      localStorage.setItem("rp_characterName", $("characterName").value.trim());
      localStorage.setItem("rp_playerName", $("playerName").value.trim());
      localStorage.setItem("rp_characterPrompt", $("characterPrompt").value.trim());
      localStorage.setItem("rp_scenarioPrompt", $("scenarioPrompt").value.trim());
      localStorage.setItem("rp_memoryPrompt", $("memoryPrompt").value.trim());
      localStorage.setItem("rp_stylePrompt", $("stylePrompt").value.trim() || DEFAULTS.stylePrompt);
      closeOverlay("characterOverlay");
      render();
    }

    function buildSystemPrompt() {
      const s = getSettings();
      return [
        "你是一个沉浸式角色扮演引擎。",
        "重要规则：只扮演角色、NPC、环境和旁白；不要替用户发言；不要替用户做决定；保持连续性。",
        s.characterName ? `你主要扮演的角色名：${s.characterName}` : "",
        s.playerName ? `用户/玩家称呼：${s.playerName}` : "",
        s.characterPrompt ? `角色设定：\n${s.characterPrompt}` : "",
        s.scenarioPrompt ? `场景/世界观：\n${s.scenarioPrompt}` : "",
        s.memoryPrompt ? `长期记忆：\n${s.memoryPrompt}` : "",
        s.stylePrompt ? `回复风格：\n${s.stylePrompt}` : ""
      ].filter(Boolean).join("\n\n");
    }

    function extractError(data, status) {
      let detail = data?.detail || data?.error || data?.message || "未知错误";
      if (typeof detail !== "string") detail = JSON.stringify(detail);
      try {
        const parsed = JSON.parse(detail);
        detail = parsed?.error?.message || parsed?.message || JSON.stringify(parsed);
      } catch {}
      return `请求失败：HTTP ${status} · ${detail}`;
    }

    async function callApi(text) {
      const s = getSettings();
      if (!s.workerUrl) throw new Error("请先在设置里填写 Worker 接口地址。格式类似：https://xxx.workers.dev/chat");
      if (!s.appToken) throw new Error("请先在设置里填写 APP_TOKEN。这个不是 DeepSeek API Key，是你自己设置的网页访问密码。");

      const requestMessages = [
        { role: "system", content: buildSystemPrompt() },
        ...messages.slice(-40),
        { role: "user", content: text }
      ];

      const res = await fetch(s.workerUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-App-Token": s.appToken
        },
        body: JSON.stringify({
          model: s.model,
          messages: requestMessages,
          temperature: s.temperature,
          max_tokens: Math.max(256, Math.min(4000, s.maxTokens)),
          thinking: s.thinking
        })
      });

      let data = null;
      try { data = await res.json(); } catch { data = { error: await res.text() }; }
      if (!res.ok) throw new Error(extractError(data, res.status));
      return data?.choices?.[0]?.message?.content || "没有收到有效回复。";
    }

    async function sendText(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      if (!messages.length) chatEl.innerHTML = "";
      messages.push({ role: "user", content: trimmed });
      saveMessages();
      addBubble("user", trimmed);
      userInput.value = "";
      userInput.style.height = "auto";
      sendBtn.disabled = true;
      continueBtn.disabled = true;
      const note = addNote("正在生成……");
      try {
        const reply = await callApi(trimmed);
        note.remove();
        messages.push({ role: "assistant", content: reply });
        saveMessages();
        addBubble("assistant", reply);
      } catch (err) {
        note.textContent = err.message;
        note.className = "note error";
      } finally {
        sendBtn.disabled = false;
        continueBtn.disabled = false;
        userInput.focus();
      }
    }

    async function testConnection() {
      saveSettingsFromForm();
      if (!messages.length) chatEl.innerHTML = "";
      const note = addNote("正在测试连接……");
      try {
        const reply = await callApi("只回复两个字：成功");
        note.textContent = "连接成功：" + reply;
      } catch (err) {
        note.textContent = err.message;
        note.className = "note error";
      }
    }

    $("settingsBtn").addEventListener("click", () => { fillSettings(); openOverlay("settingsOverlay"); });
    $("closeSettings").addEventListener("click", () => closeOverlay("settingsOverlay"));
    $("saveSettings").addEventListener("click", saveSettingsFromForm);
    $("testBtn").addEventListener("click", testConnection);

    $("characterBtn").addEventListener("click", () => { fillCharacter(); openOverlay("characterOverlay"); });
    $("closeCharacter").addEventListener("click", () => closeOverlay("characterOverlay"));
    $("saveCharacter").addEventListener("click", saveCharacterFromForm);

    $("clearBtn").addEventListener("click", () => {
      if (!confirm("确定清空当前对话吗？角色卡和设置会保留。")) return;
      messages = [];
      saveMessages();
      render();
    });

    $("exportBtn").addEventListener("click", () => {
      const data = { settings: getSettings(), messages, exportedAt: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `rp-save-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    composer.addEventListener("submit", (e) => {
      e.preventDefault();
      sendText(userInput.value);
    });
    continueBtn.addEventListener("click", () => sendText("请根据当前场景自然继续剧情。不要替我发言。"));
    userInput.addEventListener("input", () => {
      userInput.style.height = "auto";
      userInput.style.height = `${Math.min(userInput.scrollHeight, 180)}px`;
    });
    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendText(userInput.value);
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeOverlay("settingsOverlay");
        closeOverlay("characterOverlay");
      }
    });

    render();
  </script>
</body>
</html>
