<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Lily Tavern RP</title>

  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Lily RP" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">✦</div>
        <div>
          <h1>Lily Tavern</h1>
          <p>DeepSeek RP Web</p>
        </div>
      </div>

      <section class="card character-card">
        <div class="character-avatar" id="characterAvatar">莉</div>
        <h2 id="characterTitle">未设置角色</h2>
        <p id="scenePreview">先点「角色卡」写入角色设定、场景和长期记忆。</p>
        <button id="characterBtn" type="button">角色卡</button>
      </section>

      <section class="card">
        <h3>连接状态</h3>
        <p id="settingsText">未连接</p>
        <button id="settingsBtn" type="button">设置</button>
      </section>

      <section class="card tips">
        <h3>小提示</h3>
        <p>适合酒馆、OC、剧情推进、沉浸式角色扮演。</p>
        <p>建议模型：deepseek-v4-flash</p>
        <p>建议温度：0.8 - 1.0</p>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">welcome to tavern</p>
          <h2 id="mobileCharacterTitle">Lily Tavern</h2>
        </div>

        <div class="top-actions">
          <button id="mobileCharacterBtn" type="button">角色卡</button>
          <button id="clearBtn" type="button">清空</button>
        </div>
      </header>

      <section id="chat" class="chat"></section>

      <form id="composer" class="composer">
        <textarea id="userInput" rows="1" placeholder="输入你的动作、台词或剧情……"></textarea>
        <div class="composer-actions">
          <button id="continueBtn" type="button">续写</button>
          <button id="sendBtn" type="submit">发送</button>
        </div>
      </form>
    </main>
  </div>

  <dialog id="settingsDialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-head">
        <h2>连接设置</h2>
        <button id="closeSettings" type="button">×</button>
      </div>

      <label>
        Worker 接口地址
        <input id="workerUrl" value="https://deepseek-proxy.marea-deepseek-web.workers.dev/chat" />
      </label>

      <label>
        APP_TOKEN
        <input id="appToken" type="password" placeholder="输入你在 Cloudflare 设置的 APP_TOKEN" />
      </label>

      <label>
        模型
        <select id="modelSelect">
          <option value="deepseek-v4-flash">deepseek-v4-flash</option>
          <option value="deepseek-v4-pro">deepseek-v4-pro</option>
        </select>
      </label>

      <div class="grid-2">
        <label>
          Temperature
          <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.9" />
        </label>

        <label>
          Max Tokens
          <input id="maxTokens" type="number" min="256" max="4000" step="100" value="2800" />
        </label>
      </div>

      <label class="check">
        <input id="thinkingMode" type="checkbox" />
        开启思考模式
      </label>

      <div class="dialog-actions">
        <button id="cancelSettings" type="button">取消</button>
        <button id="saveSettings" type="button">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="characterDialog">
    <form method="dialog" class="dialog-card wide">
      <div class="dialog-head">
        <h2>角色卡</h2>
        <button id="closeCharacter" type="button">×</button>
      </div>

      <div class="grid-2">
        <label>
          角色名
          <input id="characterName" placeholder="例如：莉莉娅" />
        </label>

        <label>
          你的昵称
          <input id="playerName" placeholder="例如：旅人" />
        </label>
      </div>

      <label>
        角色设定
        <textarea id="characterPrompt" rows="5" placeholder="写角色身份、性格、说话方式、禁忌、关系等。"></textarea>
      </label>

      <label>
        场景设定
        <textarea id="scenarioPrompt" rows="5" placeholder="写当前地点、世界观、开场剧情、当前任务等。"></textarea>
      </label>

      <label>
        长期记忆
        <textarea id="memoryPrompt" rows="4" placeholder="写已经发生的重要事件、关系变化、约定等。"></textarea>
      </label>

      <label>
        回复风格
        <textarea id="stylePrompt" rows="4" placeholder="例如：沉浸式描写；不要代替用户发言；每次回复 2-6 段。"></textarea>
      </label>

      <div class="dialog-actions">
        <button id="cancelCharacter" type="button">取消</button>
        <button id="saveCharacter" type="button">保存角色卡</button>
      </div>
    </form>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
